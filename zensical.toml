[project]
site_name = "stopwatch"
site_url = "https://abelkidanehaile.github.io/stopwatch/"
repo_url = "https://github.com/AbelKidaneHaile/stopwatch"
repo_name = "AbelKidaneHaile/stopwatch"

nav = [
  { "Home" = "index.md" },
  { "Installation" = "installation.md" },
  { "Quick start" = "usage.md" },
  { "User guide" = [
    { "Durations" = "durations.md" },
    { "Manual stopwatch" = "manual-stopwatch.md" },
    { "Contexts and decorators" = "instrumentation.md" },
    { "Registries and statistics" = "registries.md" },
    { "Budgets" = "budgets.md" },
    { "Sinks and exports" = "sinks-and-exports.md" },
    { "Testing and configuration" = "testing-and-configuration.md" },
    { "Command-line interface" = "cli.md" },
    { "Practical recipes" = "recipes.md" },
  ] },
  { "API Reference" = "api.md" },
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]
